<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Together — Stats</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { max-width: 640px; margin: 0 auto; padding: 40px 20px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 24px; }
  .stat-card {
    background: var(--glass-strong);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .stat-card .num { font-size: 30px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .admin-msg { margin-top: 24px; font-size: 14px; color: var(--muted); }
  h1 { font-size: 22px; }
</style>
</head>
<body>
  <h1>📊 Together — usage stats</h1>
  <div id="statsMsg" class="admin-msg">Loading…</div>
  <div id="statsGrid" class="stats-grid hidden"></div>

  <script>
    const CARDS = [
      ["totalAccounts", "Total accounts created"],
      ["totalPageLoads", "Total page loads"],
      ["totalRoomsCreated", "Total rooms ever created"],
      ["totalRoomJoins", "Total room joins (all-time)"],
      ["activeRoomsRightNow", "Rooms active right now"],
      ["activeUsersRightNow", "People in a room right now"],
    ];

    fetch("/api/admin/stats")
      .then((r) => {
        if (r.status === 404) throw new Error("not-admin");
        if (!r.ok) throw new Error("error");
        return r.json();
      })
      .then((data) => {
        document.getElementById("statsMsg").classList.add("hidden");
        const grid = document.getElementById("statsGrid");
        grid.classList.remove("hidden");
        grid.innerHTML = CARDS.map(
          ([key, label]) => `<div class="stat-card"><div class="num">${data[key] ?? "—"}</div><div class="label">${label}</div></div>`
        ).join("");
      })
      .catch((e) => {
        document.getElementById("statsMsg").textContent =
          e.message === "not-admin"
            ? "Log in with your admin account on the main app first (same browser), then reload this page."
            : "Couldn't load stats — try reloading.";
      });
  </script>
</body>
</html>
